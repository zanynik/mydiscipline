name: Publish iOS TestFlight

# Builds the native SwiftUI MyDiscipline app, signs it with an Apple
# Distribution cert + App Store provisioning profile minted on the fly via the
# App Store Connect API, exports an IPA, and uploads it to TestFlight.
#
# Adapted from zanynik/slowclaw.social's pub-testflight-ios.yml, but for a plain
# Xcode (XcodeGen) project instead of a Tauri app: no Rust/Node/CocoaPods.

on:
    push:
        branches:
            - main
        paths:
            - ".github/workflows/pub-testflight-ios.yml"
            - "project.yml"
            - "MyDiscipline/**"
    workflow_dispatch:
        inputs:
            build_number:
                description: "Optional App Store build number. Defaults to the GitHub run number."
                required: false
                type: string
            apple_development_team:
                description: "Optional Apple Developer Team ID. Defaults to the APPLE_DEVELOPMENT_TEAM repository variable or secret."
                required: false
                type: string

concurrency:
    group: testflight-ios-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: read

jobs:
    build-and-upload:
        name: Build and Upload iOS App
        runs-on: macos-26
        timeout-minutes: 60
        environment: macOS
        env:
            APP_BUNDLE_ID: com.zanynik.mydiscipline
            APP_NAME: MyDiscipline
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Ensure XcodeGen is available
              run: |
                  set -euo pipefail
                  if ! command -v xcodegen >/dev/null 2>&1; then
                    brew install xcodegen
                  fi
                  xcodegen --version

            - name: Show Apple build tool versions
              run: |
                  set -euo pipefail
                  xcodebuild -version
                  xcrun --find altool

            - name: Prepare App Store Connect API key
              env:
                  APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
                  APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
                  APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
              run: |
                  set -euo pipefail
                  : "${APP_STORE_CONNECT_ISSUER_ID:?APP_STORE_CONNECT_ISSUER_ID secret is required}"
                  : "${APP_STORE_CONNECT_KEY_ID:?APP_STORE_CONNECT_KEY_ID secret is required}"
                  : "${APP_STORE_CONNECT_PRIVATE_KEY:?APP_STORE_CONNECT_PRIVATE_KEY secret is required}"

                  printf '::add-mask::%s\n' "${APP_STORE_CONNECT_ISSUER_ID}"
                  printf '::add-mask::%s\n' "${APP_STORE_CONNECT_KEY_ID}"

                  ASC_KEY_DIR="${HOME}/.appstoreconnect/private_keys"
                  printf 'ASC_KEY_DIR=%s\n' "${ASC_KEY_DIR}" >>"${GITHUB_ENV}"
                  mkdir -p "${ASC_KEY_DIR}"
                  chmod 700 "${ASC_KEY_DIR}"
                  perl -pe 's/\\n/\n/g' <<<"${APP_STORE_CONNECT_PRIVATE_KEY}" >"${ASC_KEY_DIR}/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
                  chmod 600 "${ASC_KEY_DIR}/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

            - name: Enable Family Controls capability (idempotent)
              env:
                  APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
                  APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
              run: |
                  set -euo pipefail
                  : "${ASC_KEY_DIR:?ASC_KEY_DIR was not initialized}"
                  : "${APP_STORE_CONNECT_ISSUER_ID:?APP_STORE_CONNECT_ISSUER_ID secret is required}"
                  : "${APP_STORE_CONNECT_KEY_ID:?APP_STORE_CONNECT_KEY_ID secret is required}"
                  ASC_KEY_PATH="${ASC_KEY_DIR}/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" \
                  ASC_ISSUER_ID="${APP_STORE_CONNECT_ISSUER_ID}" \
                  ASC_KEY_ID="${APP_STORE_CONNECT_KEY_ID}" \
                  APP_BUNDLE_ID="${APP_BUNDLE_ID}" \
                  node <<'NODE'
                  const crypto = require("crypto");
                  const fs = require("fs");
                  const https = require("https");

                  function base64Url(input) {
                    return Buffer.from(input).toString("base64").replace(/=/g, "").replace(/\+/g, "-").replace(/\//g, "_");
                  }
                  function jwt() {
                    const header = { alg: "ES256", kid: process.env.ASC_KEY_ID, typ: "JWT" };
                    const now = Math.floor(Date.now() / 1000);
                    const payload = { iss: process.env.ASC_ISSUER_ID, iat: now, exp: now + 900, aud: "appstoreconnect-v1" };
                    const body = `${base64Url(JSON.stringify(header))}.${base64Url(JSON.stringify(payload))}`;
                    const privateKey = fs.readFileSync(process.env.ASC_KEY_PATH, "utf8");
                    const signature = crypto.sign("sha256", Buffer.from(body), { key: privateKey, dsaEncoding: "ieee-p1363" });
                    return `${body}.${base64Url(signature)}`;
                  }
                  async function request(token, method, path, body) {
                    const payload = body ? JSON.stringify(body) : undefined;
                    const response = await new Promise((resolve, reject) => {
                      const req = https.request({
                        hostname: "api.appstoreconnect.apple.com",
                        method,
                        path,
                        headers: {
                          Authorization: `Bearer ${token}`,
                          Accept: "application/json",
                          "Content-Type": "application/json",
                          ...(payload ? { "Content-Length": Buffer.byteLength(payload) } : {})
                        }
                      }, (res) => {
                        let raw = "";
                        res.setEncoding("utf8");
                        res.on("data", (chunk) => raw += chunk);
                        res.on("end", () => resolve({ status: res.statusCode, raw }));
                      });
                      req.on("error", reject);
                      if (payload) req.write(payload);
                      req.end();
                    });
                    let parsed = {};
                    if (response.raw.trim()) parsed = JSON.parse(response.raw);
                    return { status: response.status, parsed };
                  }

                  (async () => {
                    const token = jwt();
                    const bundleId = process.env.APP_BUNDLE_ID;

                    const bundle = await request(token, "GET", `/v1/bundleIds?filter[identifier]=${encodeURIComponent(bundleId)}`);
                    const bundleRecord = bundle.parsed.data?.[0];
                    if (!bundleRecord?.id) {
                      throw new Error(`Bundle ID ${bundleId} was not found in App Store Connect.`);
                    }
                    const bundleResourceId = bundleRecord.id;

                    const existing = await request(token, "GET", `/v1/bundleIds/${bundleResourceId}/bundleIdCapabilities`);
                    const hasFamilyControls = (existing.parsed.data || []).some(
                      (c) => c.attributes?.capabilityType === "FAMILY_CONTROLS"
                    );
                    if (hasFamilyControls) {
                      console.log("FAMILY_CONTROLS capability already enabled; skipping.");
                      return;
                    }

                    // Enable it. A 409 "already exists" is treated as success.
                    const enable = await request(token, "POST", "/v1/bundleIdCapabilities", {
                      data: {
                        type: "bundleIdCapabilities",
                        attributes: { capabilityType: "FAMILY_CONTROLS" },
                        relationships: { bundleId: { data: { type: "bundleIds", id: bundleResourceId } } }
                      }
                    });
                    if (enable.status >= 200 && enable.status < 300) {
                      console.log("FAMILY_CONTROLS capability enabled.");
                    } else if (enable.status === 409) {
                      console.log("FAMILY_CONTROLS capability already enabled (409); treating as success.");
                    } else {
                      const detail = enable.parsed?.errors?.[0]?.detail || `HTTP ${enable.status}`;
                      throw new Error(`Could not enable FAMILY_CONTROLS capability: ${detail}`);
                    }
                  })().catch((error) => {
                    console.error(error.message);
                    process.exit(1);
                  });
                  NODE

            - name: Prepare Apple distribution signing assets
              env:
                  APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
                  APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
                  APPLE_DEVELOPMENT_TEAM: ${{ inputs.apple_development_team || vars.APPLE_DEVELOPMENT_TEAM || secrets.APPLE_DEVELOPMENT_TEAM }}
              run: |
                  set -euo pipefail
                  : "${ASC_KEY_DIR:?ASC_KEY_DIR was not initialized}"
                  : "${APP_STORE_CONNECT_ISSUER_ID:?APP_STORE_CONNECT_ISSUER_ID secret is required}"
                  : "${APP_STORE_CONNECT_KEY_ID:?APP_STORE_CONNECT_KEY_ID secret is required}"
                  : "${APPLE_DEVELOPMENT_TEAM:?Set the APPLE_DEVELOPMENT_TEAM repository variable or provide the apple_development_team workflow input.}"

                  SIGNING_DIR="${RUNNER_TEMP}/apple-signing"
                  mkdir -p "${SIGNING_DIR}" "${HOME}/Library/MobileDevice/Provisioning Profiles"
                  chmod 700 "${SIGNING_DIR}"

                  KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"
                  P12_PASSWORD="$(openssl rand -hex 32)"
                  KEYCHAIN_PATH="${RUNNER_TEMP}/mydiscipline-signing.keychain-db"
                  printf '::add-mask::%s\n' "${KEYCHAIN_PASSWORD}"
                  printf '::add-mask::%s\n' "${P12_PASSWORD}"
                  printf 'KEYCHAIN_PASSWORD=%s\n' "${KEYCHAIN_PASSWORD}" >>"${GITHUB_ENV}"
                  printf 'APPLE_SIGNING_KEYCHAIN=%s\n' "${KEYCHAIN_PATH}" >>"${GITHUB_ENV}"

                  openssl genrsa -out "${SIGNING_DIR}/signing.key" 2048
                  openssl req -new -key "${SIGNING_DIR}/signing.key" -out "${SIGNING_DIR}/signing.csr" -subj "/CN=MyDiscipline CI/"

                  ASC_KEY_PATH="${ASC_KEY_DIR}/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
                  PROFILE_NAME="MyDiscipline CI App Store ${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
                  ASC_KEY_PATH="${ASC_KEY_PATH}" \
                  ASC_ISSUER_ID="${APP_STORE_CONNECT_ISSUER_ID}" \
                  ASC_KEY_ID="${APP_STORE_CONNECT_KEY_ID}" \
                  APP_BUNDLE_ID="${APP_BUNDLE_ID}" \
                  CERT_CSR_PATH="${SIGNING_DIR}/signing.csr" \
                  CERT_OUT_PATH="${SIGNING_DIR}/distribution.cer" \
                  PROFILE_OUT_PATH="${SIGNING_DIR}/profile.mobileprovision" \
                  PROFILE_ID_OUT_PATH="${SIGNING_DIR}/profile.id" \
                  PROFILE_NAME_OUT_PATH="${SIGNING_DIR}/profile.name" \
                  PROFILE_NAME="${PROFILE_NAME}" \
                  node <<'NODE'
                  const crypto = require("crypto");
                  const fs = require("fs");
                  const https = require("https");

                  function base64Url(input) {
                    return Buffer.from(input).toString("base64").replace(/=/g, "").replace(/\+/g, "-").replace(/\//g, "_");
                  }
                  function jwt() {
                    const header = { alg: "ES256", kid: process.env.ASC_KEY_ID, typ: "JWT" };
                    const now = Math.floor(Date.now() / 1000);
                    const payload = { iss: process.env.ASC_ISSUER_ID, iat: now, exp: now + 900, aud: "appstoreconnect-v1" };
                    const body = `${base64Url(JSON.stringify(header))}.${base64Url(JSON.stringify(payload))}`;
                    const privateKey = fs.readFileSync(process.env.ASC_KEY_PATH, "utf8");
                    const signature = crypto.sign("sha256", Buffer.from(body), { key: privateKey, dsaEncoding: "ieee-p1363" });
                    return `${body}.${base64Url(signature)}`;
                  }
                  async function request(token, method, path, body) {
                    const payload = body ? JSON.stringify(body) : undefined;
                    const response = await new Promise((resolve, reject) => {
                      const req = https.request({
                        hostname: "api.appstoreconnect.apple.com",
                        method,
                        path,
                        headers: {
                          Authorization: `Bearer ${token}`,
                          Accept: "application/json",
                          "Content-Type": "application/json",
                          ...(payload ? { "Content-Length": Buffer.byteLength(payload) } : {})
                        }
                      }, (res) => {
                        let raw = "";
                        res.setEncoding("utf8");
                        res.on("data", (chunk) => raw += chunk);
                        res.on("end", () => resolve({ status: res.statusCode, raw }));
                      });
                      req.on("error", reject);
                      if (payload) req.write(payload);
                      req.end();
                    });
                    let parsed = {};
                    if (response.raw.trim()) parsed = JSON.parse(response.raw);
                    if (response.status < 200 || response.status >= 300) {
                      const detail = parsed?.errors?.[0]?.detail || parsed?.errors?.[0]?.title || `HTTP ${response.status}`;
                      throw new Error(detail);
                    }
                    return parsed;
                  }

                  (async () => {
                    const token = jwt();
                    const bundleId = process.env.APP_BUNDLE_ID;
                    const bundle = await request(token, "GET", `/v1/bundleIds?filter[identifier]=${encodeURIComponent(bundleId)}`);
                    const bundleRecord = bundle.data?.[0];
                    if (!bundleRecord?.id) {
                      throw new Error(`Bundle ID ${bundleId} was not found in App Store Connect.`);
                    }

                    // Clean up stale CI profiles/certs from previous runs.
                    const staleProfiles = await request(token, "GET", "/v1/profiles?filter[profileType]=IOS_APP_STORE&limit=200");
                    for (const staleProfile of staleProfiles.data || []) {
                      if (!String(staleProfile.attributes?.name || "").startsWith("MyDiscipline CI App Store ")) continue;
                      const relatedCerts = await request(token, "GET", `/v1/profiles/${staleProfile.id}/certificates?fields[certificates]=certificateType&limit=20`);
                      await request(token, "DELETE", `/v1/profiles/${staleProfile.id}`);
                      for (const relatedCert of relatedCerts.data || []) {
                        if (relatedCert.attributes?.certificateType === "IOS_DISTRIBUTION") {
                          await request(token, "DELETE", `/v1/certificates/${relatedCert.id}`);
                        }
                      }
                    }

                    const csrContent = fs.readFileSync(process.env.CERT_CSR_PATH, "utf8");
                    let cert;
                    try {
                      cert = await request(token, "POST", "/v1/certificates", {
                        data: { type: "certificates", attributes: { certificateType: "IOS_DISTRIBUTION", csrContent } }
                      });
                    } catch (error) {
                      throw new Error(`Could not create Apple Distribution certificate. If the certificate limit is full, revoke an unused Distribution certificate in Apple Developer Certificates, Identifiers & Profiles, then rerun. Apple said: ${error.message}`);
                    }
                    const certRecord = cert.data;
                    fs.writeFileSync(process.env.CERT_OUT_PATH, Buffer.from(certRecord.attributes.certificateContent, "base64"));

                    const profile = await request(token, "POST", "/v1/profiles", {
                      data: {
                        type: "profiles",
                        attributes: { name: process.env.PROFILE_NAME, profileType: "IOS_APP_STORE" },
                        relationships: {
                          bundleId: { data: { type: "bundleIds", id: bundleRecord.id } },
                          certificates: { data: [{ type: "certificates", id: certRecord.id }] }
                        }
                      }
                    });
                    const profileRecord = profile.data;
                    fs.writeFileSync(process.env.PROFILE_OUT_PATH, Buffer.from(profileRecord.attributes.profileContent, "base64"));
                    fs.writeFileSync(process.env.PROFILE_NAME_OUT_PATH, profileRecord.attributes.name);
                    fs.writeFileSync(process.env.PROFILE_ID_OUT_PATH, profileRecord.attributes.uuid);
                    fs.appendFileSync(process.env.GITHUB_ENV, `APPLE_PROVISIONING_PROFILE_NAME=${profileRecord.attributes.name}\n`);
                    fs.appendFileSync(process.env.GITHUB_ENV, `APPLE_PROVISIONING_PROFILE_ID=${profileRecord.attributes.uuid}\n`);
                  })().catch((error) => {
                    console.error(error.message);
                    process.exit(1);
                  });
                  NODE

                  openssl x509 -inform DER -in "${SIGNING_DIR}/distribution.cer" -out "${SIGNING_DIR}/distribution.pem"
                  openssl pkcs12 -legacy -export -inkey "${SIGNING_DIR}/signing.key" -in "${SIGNING_DIR}/distribution.pem" -out "${SIGNING_DIR}/signing.p12" -passout "pass:${P12_PASSWORD}"
                  security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
                  security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
                  security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
                  security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain-db
                  security default-keychain -s "${KEYCHAIN_PATH}"
                  security import "${SIGNING_DIR}/signing.p12" -k "${KEYCHAIN_PATH}" -P "${P12_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
                  security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
                  APPLE_PROVISIONING_PROFILE_ID="$(cat "${SIGNING_DIR}/profile.id")"
                  APPLE_PROVISIONING_PROFILE_NAME="$(cat "${SIGNING_DIR}/profile.name")"
                  cp "${SIGNING_DIR}/profile.mobileprovision" "${HOME}/Library/MobileDevice/Provisioning Profiles/${APPLE_PROVISIONING_PROFILE_ID}.mobileprovision"

            - name: Generate Xcode project and build signed IPA
              env:
                  APPLE_DEVELOPMENT_TEAM: ${{ inputs.apple_development_team || vars.APPLE_DEVELOPMENT_TEAM || secrets.APPLE_DEVELOPMENT_TEAM }}
                  BUILD_NUMBER: ${{ inputs.build_number || github.run_number }}
              run: |
                  set -euo pipefail
                  : "${APPLE_DEVELOPMENT_TEAM:?Set the APPLE_DEVELOPMENT_TEAM repository variable or provide the apple_development_team workflow input.}"
                  : "${APPLE_PROVISIONING_PROFILE_NAME:?Apple provisioning profile was not initialized}"

                  xcodegen generate

                  # The export options plist carries the per-run profile name
                  # and the team id, so it can't be a static committed file.
                  cat >build/ExportOptions.plist <<PLIST
                  <?xml version="1.0" encoding="UTF-8"?>
                  <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
                  <plist version="1.0">
                  <dict>
                      <key>method</key><string>app-store</string>
                      <key>signingStyle</key><string>manual</string>
                      <key>teamID</key><string>${APPLE_DEVELOPMENT_TEAM}</string>
                      <key>signingCertificate</key><string>Apple Distribution</string>
                      <key>provisioningProfiles</key>
                      <dict>
                          <key>${APP_BUNDLE_ID}</key>
                          <string>${APPLE_PROVISIONING_PROFILE_NAME}</string>
                      </dict>
                      <key>stripSwiftSymbols</key><true/>
                      <key>uploadSymbols</key><true/>
                      <key>compileBitcode</key><false/>
                  </dict>
                  </plist>
                  PLIST

                  mkdir -p build
                  xcodebuild archive \
                    -project "${APP_NAME}.xcodeproj" \
                    -scheme "${APP_NAME}" \
                    -configuration Release \
                    -archivePath "build/${APP_NAME}.xcarchive" \
                    -destination "generic/platform=iOS" \
                    DEVELOPMENT_TEAM="${APPLE_DEVELOPMENT_TEAM}" \
                    CODE_SIGN_STYLE=Manual \
                    CODE_SIGN_IDENTITY="Apple Distribution" \
                    PROVISIONING_PROFILE_SPECIFIER="${APPLE_PROVISIONING_PROFILE_NAME}" \
                    CURRENT_PROJECT_VERSION="${BUILD_NUMBER}"

                  xcodebuild -exportArchive \
                    -archivePath "build/${APP_NAME}.xcarchive" \
                    -exportOptionsPlist build/ExportOptions.plist \
                    -exportPath build/ipa

                  IPA_PATH="$(find build/ipa -type f -name '*.ipa' -print -quit)"
                  if [[ -z "${IPA_PATH}" ]]; then
                    echo "No IPA produced under build/ipa."
                    exit 1
                  fi
                  printf 'IPA_PATH=%s\n' "${IPA_PATH}" >>"${GITHUB_ENV}"

            - name: Upload IPA to TestFlight
              env:
                  APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
                  APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
              run: |
                  set -euo pipefail
                  : "${IPA_PATH:?IPA_PATH was not initialized}"
                  xcrun altool --upload-app \
                    --type ios \
                    --file "${IPA_PATH}" \
                    --apiKey "${APP_STORE_CONNECT_KEY_ID}" \
                    --apiIssuer "${APP_STORE_CONNECT_ISSUER_ID}"

            - name: Clean up App Store Connect API key
              if: always()
              env:
                  APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
              run: |
                  set -euo pipefail
                  ASC_KEY_DIR="${ASC_KEY_DIR:-${HOME}/.appstoreconnect/private_keys}"
                  rm -f "${ASC_KEY_DIR}/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
                  if [[ -n "${APPLE_SIGNING_KEYCHAIN:-}" ]]; then
                    security delete-keychain "${APPLE_SIGNING_KEYCHAIN}" || true
                  fi
