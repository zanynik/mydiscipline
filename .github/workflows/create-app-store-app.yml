name: Register bundle ID (one-off)

# This workflow is a TEMPORARY one-off: it registers the bundle ID
# (App ID) com.mydiscipline.app in the Apple Developer Portal via the
# App Store Connect API (POST /v1/bundleIds), using an Admin API key.
#
# Why not fastlane `produce`? In fastlane 2.236.x `produce` only authenticates
# via the legacy Apple Developer Portal web session (Apple ID + password),
# so it cannot be driven by an API key in a non-interactive CI run. There is
# no fastlane action that registers a bundle ID via the modern API, so we call
# the endpoint directly in scripts/register_bundle_id.py.
#
# Once the run succeeds, this file (and the script) can be deleted.

on:
  workflow_dispatch: # manual trigger only

jobs:
  register_bundle_id:
    runs-on: macos-latest
    environment: macOS

    env:
      # Map the repo secrets onto the env var names the script reads. The key
      # content must be usable as a PEM private key; if the secret holds only the
      # raw base64 body of the .p8 file, the script re-wraps it in PEM headers.
      APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Register bundle ID via App Store Connect API
        env:
          BUNDLE_ID: "com.zanynik.mydiscipline"
          BUNDLE_NAME: "MyDiscipline"
        run: python3 scripts/register_bundle_id.py
