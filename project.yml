# XcodeGen project specification for MyDiscipline.
# Regenerate the Xcode project on macOS/CI with:  xcodegen generate
# (see README.md)

name: MyDiscipline
options:
  bundleIdPrefix: com.zanynik
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1"
    # CURRENT_PROJECT_VERSION is provided by CI (build number); default for local builds.
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Apple Distribution"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  MyDiscipline:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: MyDiscipline
    info:
      path: MyDiscipline/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zanynik.mydiscipline
        CODE_SIGN_ENTITLEMENTS: MyDiscipline/MyDiscipline.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "NO"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
